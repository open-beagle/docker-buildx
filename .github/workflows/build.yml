name: Build Release Images

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

permissions:
  contents: read
  packages: write

env:
  BUILD_VERSION: v0.34.0

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Cross build binaries
        env:
          VERSION: ${{ env.BUILD_VERSION }}-beagle
        run: |
          set -euxo pipefail

          mkdir -p bin/build

          revision="${GITHUB_SHA}"
          if ! git diff --no-ext-diff --quiet --exit-code; then
            revision="${revision}.m"
          fi

          ldflags="-s -w"
          ldflags="${ldflags} -X github.com/docker/buildx/version.Version=${VERSION}"
          ldflags="${ldflags} -X github.com/docker/buildx/version.Revision=${revision}"
          ldflags="${ldflags} -X github.com/docker/buildx/version.Package=github.com/docker/buildx"

          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" \
              go build -trimpath -ldflags "${ldflags}" \
              -o "bin/build/docker-buildx-linux-${arch}" ./cmd/buildx
          done

          file bin/build/docker-buildx-linux-*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images for amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .beagle/dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/docker-buildx:${{ env.BUILD_VERSION }}-amd64
          build-args: |
            BASE=alpine:3
            AUTHOR=${{ github.actor }}
            VERSION=${{ env.BUILD_VERSION }}
            TARGETOS=linux
            TARGETARCH=amd64
          provenance: false
          sbom: false

      - name: Build and push images for arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .beagle/dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/docker-buildx:${{ env.BUILD_VERSION }}-arm64
          build-args: |
            BASE=alpine:3
            AUTHOR=${{ github.actor }}
            VERSION=${{ env.BUILD_VERSION }}
            TARGETOS=linux
            TARGETARCH=arm64
          provenance: false
          sbom: false

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create ghcr.io/${{ github.repository_owner }}/docker-buildx:${{ env.BUILD_VERSION }} \
            ghcr.io/${{ github.repository_owner }}/docker-buildx:${{ env.BUILD_VERSION }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/docker-buildx:${{ env.BUILD_VERSION }}-arm64
          docker manifest push ghcr.io/${{ github.repository_owner }}/docker-buildx:${{ env.BUILD_VERSION }}
