name: Build Release Images

on:
  push:
    branches:
      - release-v0.20
  workflow_dispatch: # 允许手动触发

env:
  BUILD_VERSION: v0.20.1

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cross Build
        env:
          BUILD_VERSION: ${{ env.BUILD_VERSION }}
        run: |
          docker run --rm -v ${{ github.workspace }}:/go/src/github.com/docker/buildx \
            -w /go/src/github.com/docker/buildx \
            -e VERSION=${{ env.BUILD_VERSION }}-beagle \
            -e PLATFORM="Beagle Cloud Team 2023-2028" \
            ghcr.io/${{ github.repository_owner }}/golang:1.23-alpine \
            bash -c "bash ./.beagle/build.sh"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images for amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .beagle/dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/docker-buildx:${{ env.BUILD_VERSION }}-amd64
          build-args: |
            BASE=alpine:3
            VERSION=${{ env.BUILD_VERSION }}
            TARGETOS=linux
            TARGETARCH=amd64
          provenance: false
          sbom: false

      - name: Build and push images for arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .beagle/dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/docker-buildx:${{ env.BUILD_VERSION }}-arm64
          build-args: |
            BASE=alpine:3
            AUTHOR=${{ github.actor }}
            VERSION=${{ env.BUILD_VERSION }}
            TARGETOS=linux
            TARGETARCH=arm64
          provenance: false
          sbom: false
